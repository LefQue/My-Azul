<title>Azul — Créer une partie</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  .mode-btn{
    width:100%; text-align:left; padding:10px 12px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); color:var(--text); text-transform:none; letter-spacing:normal; min-height:auto;
  }
  .mode-btn.primary{ background:var(--accent); color:var(--card); border-color:var(--accent); }
  .mode-btn strong{ font-family:var(--font-display); font-size:.85rem; }
  .mode-btn span{ display:block; font-size:.75rem; opacity:.8; margin-top:2px; }
</style>
</head>
<body>
<div id="app">

  <section id="screen-setup">
    <a class="home-link" href="../home.html">← Accueil</a>
    <h1 class="wordmark">Azul<span class="wordmark-sub">Nouvelle partie</span></h1>
    <div class="tile-card">
      <p>Mode de jeu</p>
      <div id="game-mode-selector" style="display:flex; flex-direction:column; gap:8px; margin:8px 0 16px;"></div>
      <p>Nombre de joueurs</p>
      <div id="player-count-selector" style="display:flex; gap:8px; margin:8px 0 16px;"></div>
      <button id="btn-create" class="btn primary">Créer la partie</button>
    </div>
  </section>

  <section id="screen-lobby" style="display:none">
    <h1 class="wordmark">Azul<span class="wordmark-sub">Salon d'attente</span></h1>
    <div class="tile-card">
      <div class="join-code" id="join-code-display"></div>
      <div id="qr-container"></div>
      <p style="text-align:center; color:var(--muted); font-size:.82rem;">
        Les autres joueurs scannent ce QR code (ou vont sur cette page et tapent le code) pour rejoindre.
      </p>
    </div>
    <h2>Joueurs</h2>
    <div class="tile-card">
      <div id="seat-list" class="seat-list"></div>
    </div>
    <button id="btn-start" class="btn primary">Démarrer la partie</button>
    <button id="btn-spectate" class="btn" style="margin-top:8px;">Ouvrir la vue spectateur</button>
  </section>

</div>
<div id="toast" class="toast"></div>

<script src="vendor/supabase-js.min.js"></script>
<script src="vendor/qrcode-generator.min.js"></script>
<script src="shared/supabase-config.js"></script>
<script src="shared/scoring-engine.js"></script>
<script src="shared/supabase-client.js"></script>
<script>
(function(){
  "use strict";

  let selectedCount = 4;
  let selectedMode = 'base';
  const GAME_MODES = [
    { id: 'base', label: 'Jeu de base', desc: 'Mur fixe, règles standard.' },
    { id: 'mosaic_free', label: 'Mosaïque éclatante — libre', desc: 'Mur libre : chaque joueur choisit sa colonne en fin de manche (1 couleur par ligne/colonne).' },
    { id: 'mosaic_a', label: 'Mosaïque éclatante — Face 1 (×2)', desc: 'Mur libre sauf 5 cases imprimées (couleur imposée) qui doublent le score de la pose.' },
    { id: 'mosaic_b', label: 'Mosaïque éclatante — Face 2 (bonus+)', desc: 'Mur libre sauf 5 cases imprimées (couleur imposée), bonus de fin de partie augmentés (+3/+10/+12).' },
  ];
  let currentGame = null;
  let unsubscribe = null;
  let toastTimer = null;

  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  function showScreen(id){
    ['screen-setup','screen-lobby'].forEach(s => {
      document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
  }

  function renderGameModeSelector(){
    const el = document.getElementById('game-mode-selector');
    el.innerHTML = '';
    GAME_MODES.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (m.id === selectedMode ? ' primary' : '');
      btn.innerHTML = `<strong>${m.label}</strong><span>${m.desc}</span>`;
      btn.addEventListener('click', () => { selectedMode = m.id; renderGameModeSelector(); });
      el.appendChild(btn);
    });
  }

  function renderPlayerCountSelector(){
    const el = document.getElementById('player-count-selector');
    el.innerHTML = '';
    [2,3,4].forEach(n => {
      const btn = document.createElement('button');
      btn.textContent = n;
      btn.className = 'btn' + (n === selectedCount ? ' primary' : '');
      btn.style.flex = '1';
      btn.addEventListener('click', () => { selectedCount = n; renderPlayerCountSelector(); });
      el.appendChild(btn);
    });
  }

  function renderQr(joinCode){
    const qr = qrcode(0, 'M');
    const joinUrl = new URL(`join.html?game=${joinCode}`, window.location.href).href;
    qr.addData(joinUrl);
    qr.make();
    document.getElementById('qr-container').innerHTML = qr.createSvgTag(4);
  }

  function renderSeats(players){
    const el = document.getElementById('seat-list');
    el.innerHTML = players.map(p => `
      <div class="seat-row ${p.claimed_by_device_id ? 'claimed' : ''}">
        <span class="${p.name ? 'seat-name' : 'seat-empty'}">${p.name ? escapeHtmlLocal(p.name) : 'siège libre'}</span>
        <span>${p.claimed_by_device_id ? '✅' : '…'}</span>
      </div>
    `).join('');
    const claimedCount = players.filter(p => p.claimed_by_device_id).length;
    document.getElementById('btn-start').disabled = claimedCount < 2;
    document.getElementById('btn-start').textContent = claimedCount < 2
      ? 'Démarrer la partie (2 joueurs min.)'
      : 'Démarrer la partie';
  }

  function escapeHtmlLocal(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function createGameFlow(){
    try{
      currentGame = await createGame(selectedCount, selectedMode);
      document.getElementById('join-code-display').textContent = currentGame.join_code;
      renderQr(currentGame.join_code);
      showScreen('screen-lobby');

      const players = await fetchPlayers(currentGame.id);
      renderSeats(players);

      if (unsubscribe) unsubscribe();
      unsubscribe = subscribeToGame(currentGame.id, {
        onPlayerChange: async () => renderSeats(await fetchPlayers(currentGame.id)),
      });
    }catch(e){
      showToast('Erreur création de partie : ' + (e.message || e));
      console.error(e);
    }
  }

  async function startGameFlow(){
    try{
      // Remet tous les "Prêt" à zéro AVANT de démarrer : des joueurs déjà sur leur plateau ont pu
      // passer prêt pendant le salon (phase lobby, où la résolution de manche ne peut pas se
      // déclencher) — sans ce reset, la 1ère manche restait bloquée jusqu'à ce que quelqu'un
      // re-toggle son bouton, puisque plus aucun toggle ne survenait après le démarrage.
      await azulSupabase.from('players').update({ ready: false }).eq('game_id', currentGame.id);
      await azulSupabase.from('games').update({ phase: 'playing' }).eq('id', currentGame.id);
      showToast('Partie démarrée !');
      window.location.href = `spectator.html?game=${currentGame.id}`;
    }catch(e){
      showToast('Erreur au démarrage : ' + (e.message || e));
      console.error(e);
    }
  }

  renderGameModeSelector();
  renderPlayerCountSelector();
  document.getElementById('btn-create').addEventListener('click', createGameFlow);
  document.getElementById('btn-start').addEventListener('click', startGameFlow);
  document.getElementById('btn-spectate').addEventListener('click', () => {
    if (currentGame) window.location.href = `spectator.html?game=${currentGame.id}`;
  });

  window.addEventListener('unhandledrejection', (e) => {
    showToast('Erreur : ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    console.error(e.reason);
  });
})();
</script>
</body>
</html>
