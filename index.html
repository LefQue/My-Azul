<title>Azul – Compte-points</title>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f2e9d8; --grout:29,76,120; --card:#fbf5e7; --text:#26313f; --muted:#7a7160;
    --border:#d9c9a4; --accent:#1d4c78; --accent-soft:#3a6690; --accent-2:#b8562f; --gold:#c9932c;
    --floor-fill:#a8402a; --shadow-sink: rgba(38,30,15,.16); --shadow-lift: rgba(38,30,15,.14);
    --font-display:'Copperplate','Big Caslon',Georgia,'Times New Roman',serif;
    --font-body:'Avenir Next',Avenir,'Century Gothic',-apple-system,sans-serif;
    --safe-t: env(safe-area-inset-top, 0px); --safe-b: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#141b29; --grout:224,179,74; --card:#1e293d; --text:#f3ead9; --muted:#9aa3b8;
      --border:#324158; --accent:#6ba3d6; --accent-soft:#8fb9de; --accent-2:#e0895f; --gold:#e0b34a;
      --floor-fill:#c4573a; --shadow-sink: rgba(0,0,0,.45); --shadow-lift: rgba(0,0,0,.4);
    }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; font-family:var(--font-body); background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:contain;
    background-image:
      repeating-linear-gradient(45deg, rgba(var(--grout),.05) 0 1.5px, transparent 1.5px 26px),
      repeating-linear-gradient(-45deg, rgba(var(--grout),.05) 0 1.5px, transparent 1.5px 26px);
  }
  #app{
    max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
    padding-top:var(--safe-t);
  }
  h1{ font-size:1.4rem; margin:.4rem 0 1rem; }
  h2{
    font-family:var(--font-display); font-size:.8rem; letter-spacing:.14em; text-transform:uppercase;
    margin:1.4rem 0 .6rem; color:var(--accent); display:flex; align-items:center; gap:8px;
  }
  h2::before{ content:''; width:8px; height:8px; background:var(--gold); transform:rotate(45deg); flex:0 0 auto; }
  button{ font:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  .screen{ padding:14px; flex:1; animation:fadeIn .5s ease both; }

  @keyframes fadeIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }
  @keyframes fadeSlideUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
  @keyframes popIn{ from{ opacity:0; transform:scale(.92); } to{ opacity:1; transform:scale(1); } }

  /* --- wordmark --- */
  .wordmark{
    font-family:var(--font-display); text-align:center; margin:8px 0 4px; color:var(--accent);
    font-size:2.4rem; letter-spacing:.06em; animation:fadeSlideUp .6s ease both;
  }
  .wordmark-sub{
    display:block; font-family:var(--font-body); font-size:.72rem; letter-spacing:.34em;
    text-transform:uppercase; color:var(--accent-2); margin-top:2px; font-weight:600;
  }
  .wordmark-rule{
    display:flex; justify-content:center; gap:6px; margin:12px 0 24px;
    animation:fadeIn .8s ease .1s both;
  }
  .wordmark-rule span{ width:6px; height:6px; background:var(--gold); transform:rotate(45deg); }

  /* --- tile card base --- */
  .tile-card{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 6px 16px var(--shadow-lift);
    position:relative;
  }
  .tile-card::before, .tile-card::after{
    content:''; position:absolute; width:9px; height:9px; border:2px solid var(--gold);
    opacity:.55;
  }
  .tile-card::before{ top:8px; left:8px; border-right:none; border-bottom:none; }
  .tile-card::after{ bottom:8px; right:8px; border-left:none; border-top:none; }

  /* --- setup --- */
  .setup-card{ margin-top:6px; animation:fadeSlideUp .6s ease .05s both; }
  .setup-card > p{ font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0 0 8px; }
  #player-count-selector{ display:flex; gap:8px; margin:8px 0 18px; }
  .count-btn{
    flex:1; min-height:46px; border-radius:8px; border:1px solid var(--border); background:transparent;
    color:var(--text); font-size:1.05rem; font-family:var(--font-display); transition:transform .12s ease;
  }
  .count-btn.active{ background:var(--accent); color:var(--card); border-color:var(--accent); }
  .count-btn:active{ transform:scale(.94); }
  #player-name-inputs{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .name-input{
    min-height:46px; padding:8px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); font-size:1rem; font-family:var(--font-body);
  }
  .name-input:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  #btn-start{
    width:100%; min-height:50px; border:none; border-radius:8px; background:var(--accent); color:var(--card);
    font-size:.95rem; font-family:var(--font-display); letter-spacing:.1em; text-transform:uppercase;
    box-shadow:0 3px 0 var(--accent-soft); transition:transform .1s ease, box-shadow .1s ease;
  }
  #btn-start:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--accent-soft); }
  #resume-banner{ margin-top:16px; margin-bottom:16px; animation:fadeSlideUp .5s ease both; }
  #resume-banner p{ margin:0 0 4px; color:var(--muted); font-size:.85rem; }
  #resume-banner .row{ display:flex; gap:8px; margin-top:10px; }
  #resume-banner button{
    flex:1; min-height:44px; border-radius:8px; border:1px solid var(--border); background:transparent;
    color:var(--text); font-family:var(--font-display); letter-spacing:.05em; transition:transform .1s ease;
  }
  #resume-banner button:active{ transform:scale(.96); }
  #btn-resume{ background:var(--accent); color:var(--card); border-color:var(--accent); }

  /* --- player tabs --- */
  #player-tabs{
    position:sticky; top:var(--safe-t); background:var(--bg); display:flex; gap:6px; padding:10px 0;
    overflow-x:auto; z-index:10; border-bottom:1px solid var(--border); scrollbar-width:none;
    animation:fadeIn .35s ease both;
  }
  #player-tabs::-webkit-scrollbar{ display:none; }
  .player-tab{
    padding:9px 15px; border-radius:7px; border:1px solid var(--border); background:var(--card);
    color:var(--text); white-space:nowrap; min-height:42px; font-size:.85rem; font-family:var(--font-body);
    transition:transform .1s ease;
  }
  .player-tab.active{ background:var(--accent); color:var(--card); border-color:var(--accent); font-weight:600; }
  .player-tab:active{ transform:scale(.95); }
  #round-badge{
    text-align:center; margin:14px auto 6px; width:74px; height:74px; border-radius:50%;
    background:var(--card); border:2px solid var(--gold); display:flex; flex-direction:column;
    align-items:center; justify-content:center; box-shadow:0 4px 10px var(--shadow-lift);
    animation:popIn .35s ease both;
  }
  #round-badge .rb-num{ font-family:var(--font-display); font-size:1.4rem; color:var(--accent); line-height:1; }
  #round-badge .rb-label{ font-size:.55rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:2px; }

  /* --- pattern lines --- */
  .pattern-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:9px; }
  /* largeur fixe (5 cases + 4 espaces) + alignement à droite : reproduit le plateau physique,
     où les lignes de motifs sont justifiées côté mur */
  .pl-slots{ display:flex; gap:4px; padding:4px; border-radius:6px; width:164px; justify-content:flex-end; }
  .pl-slot{
    width:28px; height:28px; border-radius:5px; border:1px solid var(--border); background:var(--bg);
    display:flex; align-items:center; justify-content:center;
  }
  .pl-palette{ display:flex; gap:6px; }
  .swatch{
    width:28px; height:28px; min-width:28px; border-radius:50%; border:2px solid rgba(255,255,255,.5);
    padding:0; box-shadow:0 1px 3px var(--shadow-sink); transition:transform .1s ease;
    display:flex; align-items:center; justify-content:center;
  }
  /* glyphe daltonien porté par chaque tuile (voir COLORS.symbol) */
  .tile-sym{
    pointer-events:none; font-size:.6rem; line-height:1;
    color:rgba(255,255,255,.92); text-shadow:0 1px 2px rgba(0,0,0,.55);
  }
  .swatch:active{ transform:scale(.88); }
  .swatch.disabled-hint{ opacity:.28; }

  /* --- wall --- */
  .wall-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:5px; max-width:230px; margin:6px auto 0; }
  .wall-cell{
    aspect-ratio:1/1; border-radius:4px; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
  }

  /* --- floor line --- */
  .floor-line{ display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
  .floor-slot{
    width:36px; height:36px; border-radius:6px; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:.78rem; color:var(--muted);
    font-family:var(--font-body); transition:transform .1s ease; background:var(--card);
  }
  .floor-slot:active{ transform:scale(.9); }
  .floor-slot.filled{ background:var(--floor-fill); color:#fdf3e7; border-color:var(--floor-fill); }
  .floor-slot.marker{ background:var(--gold); border-color:var(--gold); color:#3a2b0d; font-size:.62rem; font-weight:700; }
  .marker-toggle{ display:flex; align-items:center; gap:8px; margin-top:12px; font-size:.8rem; color:var(--muted); }
  .home-link{
    display:block; text-align:center; font-size:.78rem; color:var(--muted);
    text-decoration:none; margin:2px 0 6px;
  }

  .score-line{
    text-align:center; font-size:1.2rem; margin-top:20px; font-family:var(--font-display); color:var(--accent);
  }
  .score-line strong{ font-size:1.6rem; }
  .round-preview{ text-align:center; font-size:.78rem; color:var(--muted); margin:2px 0 0; }

  /* --- actions --- */
  #actions{
    position:sticky; bottom:0; background:var(--bg); display:flex; gap:8px; padding:10px 0;
    padding-bottom:calc(10px + var(--safe-b)); border-top:1px solid var(--border); margin-top:16px;
  }
  #actions button{
    flex:1; min-height:48px; border-radius:8px; border:1px solid var(--border); background:var(--card);
    color:var(--text); font-size:.78rem; font-family:var(--font-display); letter-spacing:.06em;
    text-transform:uppercase; transition:transform .1s ease;
  }
  #actions button:active{ transform:scale(.95); }
  #btn-end-round{ background:var(--accent); color:var(--card); border-color:var(--accent); }
  #btn-end-game{ color:var(--accent-2); border-color:var(--accent-2); }
  #btn-undo{ flex:0 0 auto; padding:0 14px; color:var(--floor-fill); border-color:var(--floor-fill); }

  /* --- toast --- */
  #toast{
    position:fixed; bottom:calc(80px + var(--safe-b)); left:50%; transform:translateX(-50%);
    background:var(--text); color:var(--bg); padding:9px 16px; border-radius:8px; opacity:0;
    pointer-events:none; transition:opacity .3s, transform .3s; z-index:200;
    max-width:88vw; text-align:center; font-size:.82rem; font-family:var(--font-body);
  }
  #toast.show{ opacity:1; transform:translate(-50%,-4px); }

  /* --- modal --- */
  .modal{ position:fixed; inset:0; background:rgba(20,15,5,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:16px; }
  .modal-content{
    background:var(--card); padding:22px; border-radius:12px; max-width:90vw; max-height:80vh; overflow:auto;
    border:1px solid var(--border); animation:popIn .25s ease both;
  }
  .modal-content h2{ margin-top:0; }
  .modal-content button{
    margin-top:16px; width:100%; min-height:46px; border-radius:8px; border:none; background:var(--accent);
    color:var(--card); font-family:var(--font-display); letter-spacing:.08em; text-transform:uppercase; font-size:.85rem;
  }

  /* --- results --- */
  #results h1{ text-align:center; }
  .result-row{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px;
    margin-bottom:10px; animation:fadeSlideUp .45s ease both;
  }
  .result-row.winner{ border-color:var(--gold); box-shadow:0 0 0 2px var(--gold) inset; }
  .rank{ font-weight:600; margin-right:8px; font-family:var(--font-display); color:var(--accent); }
  .rname{ font-family:var(--font-body); }
  .rscore{ float:right; font-weight:700; font-family:var(--font-display); color:var(--accent); }
  .rbonus{ color:var(--muted); font-size:.78rem; margin-top:6px; clear:both; }
  #btn-new-game{
    width:100%; min-height:50px; border-radius:8px; border:none; background:var(--accent); color:var(--card);
    margin-top:8px; font-family:var(--font-display); letter-spacing:.08em; text-transform:uppercase;
  }

  /* --- confettis azulejo (écran des résultats) --- */
  #confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:300; }
  .confetto{ position:absolute; top:-20px; animation:confetti-fall linear forwards; }
  @keyframes confetti-fall{
    from{ transform:translateY(-4vh) rotate(0deg); opacity:1; }
    to{ transform:translateY(108vh) rotate(720deg); opacity:.7; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }
</style>
</head>
<body>
<div id="app">

  <section id="screen-setup" class="screen">
    <a class="home-link" href="home.html">← Accueil</a>
    <h1 class="wordmark">Azul<span class="wordmark-sub">Compte-points</span></h1>
    <div class="wordmark-rule"><span></span><span></span><span></span></div>
    <div id="resume-banner" class="tile-card" style="display:none">
      <p>Une partie est en cours.</p>
      <div class="row">
        <button id="btn-resume">Reprendre</button>
        <button id="btn-discard">Nouvelle partie</button>
      </div>
    </div>
    <div class="setup-card tile-card">
      <p>Nombre de joueurs</p>
      <div id="player-count-selector"></div>
      <div id="player-name-inputs"></div>
      <button id="btn-start">Commencer la partie</button>
    </div>
  </section>

  <section id="screen-playing" class="screen" style="display:none">
    <div id="player-tabs"></div>
    <div id="round-badge"></div>
    <div id="board"></div>
    <div id="actions">
      <button id="btn-undo" style="display:none">Annuler</button>
      <button id="btn-end-round">Terminer la manche</button>
      <button id="btn-end-game">Fin de partie</button>
    </div>
  </section>

  <section id="screen-results" class="screen" style="display:none">
    <a class="home-link" href="home.html">← Accueil</a>
    <div id="results"></div>
    <button id="btn-new-game">Nouvelle partie</button>
  </section>

</div>

<div id="toast"></div>

<div id="round-summary-modal" class="modal">
  <div class="modal-content tile-card">
    <h2 id="round-summary-title">Résumé de la manche</h2>
    <div id="round-summary-body"></div>
    <button id="btn-close-summary">Fermer</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // `symbol` : glyphe distinctif affiché sur chaque tuile (comme les motifs du jeu physique) pour
  // que les 5 couleurs restent différenciables sans percevoir la couleur (daltonisme)
  const COLORS = [
    { id:'B', label:'Bleu',      hex:'#2563eb', symbol:'✿' },
    { id:'Y', label:'Jaune',     hex:'#eab308', symbol:'★' },
    { id:'R', label:'Rouge',     hex:'#dc2626', symbol:'▲' },
    { id:'K', label:'Noir',      hex:'#27272a', symbol:'●' },
    { id:'W', label:'Turquoise', hex:'#06b6d4', symbol:'◆' },
  ];
  const COLOR_MAP = Object.fromEntries(COLORS.map(c => [c.id, c]));

  // motif fixe du mur : chaque ligne est une rotation cyclique de la précédente
  const WALL_PATTERN = [
    ['B','Y','R','K','W'],
    ['W','B','Y','R','K'],
    ['K','W','B','Y','R'],
    ['R','K','W','B','Y'],
    ['Y','R','K','W','B'],
  ];
  const FLOOR_PENALTIES = [-1,-1,-2,-2,-2,-3,-3];
  const STORAGE_KEY = 'azulScoreState';

  let gameState = null;
  let lastSnapshot = null;
  let setupPlayerCount = 2;

  // ---------- persistence ----------
  function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }catch(e){} }
  function loadState(){ try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }catch(e){ return null; } }
  function clearState(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} }

  // ---------- model ----------
  function createPlayer(name){
    return {
      name,
      wall: Array.from({length:5}, () => Array(5).fill(null)),
      patternLines: Array.from({length:5}, (_, i) => ({ capacity:i+1, color:null, count:0 })),
      floorFilled: 0,
      hasFirstPlayerMarker: false,
      totalScore: 0,
      roundHistory: [],
      finalBonuses: null,
    };
  }
  function currentPlayer(){ return gameState.players[gameState.currentPlayerIndex]; }

  // ---------- scoring engine ----------
  function wallColumnFor(row, color){ return WALL_PATTERN[row].indexOf(color); }

  function runLength(wall, row, col, dRow, dCol){
    let r = row, c = col, count = 0;
    while (r >= 0 && r < 5 && c >= 0 && c < 5 && wall[r][c] !== null){
      count++; r += dRow; c += dCol;
    }
    return count;
  }

  function scoreTilePlacement(wall, row, col){
    const hRun = runLength(wall,row,col,0,1) + runLength(wall,row,col,0,-1) - 1;
    const vRun = runLength(wall,row,col,1,0) + runLength(wall,row,col,-1,0) - 1;
    if (hRun > 1 && vRun > 1) return hRun + vRun;
    if (hRun > 1) return hRun;
    if (vRun > 1) return vRun;
    return 1;
  }

  function sumFloorPenalty(filledCount){
    return FLOOR_PENALTIES.slice(0, filledCount).reduce((s,v) => s+v, 0);
  }

  function endRoundForPlayer(player, round){
    const completed = [];
    const discarded = [];
    let wallScore = 0;
    player.patternLines.forEach((line, row) => {
      if (line.count === line.capacity && line.color !== null){
        const col = wallColumnFor(row, line.color);
        if (player.wall[row][col] !== null){
          // ne peut venir que d'un ancien état (la saisie bloque ce placement) — tracé, pas silencieux
          discarded.push({ row, color: line.color });
          line.color = null; line.count = 0;
          return;
        }
        player.wall[row][col] = line.color;
        const points = scoreTilePlacement(player.wall, row, col);
        wallScore += points;
        completed.push({ row, color:line.color, col, points });
        line.color = null; line.count = 0;
      }
    });
    // le jeton premier joueur occupe une case de plancher en plus au moment du décompte
    // (floorFilled ne compte que les tuiles, voir marker-checkbox)
    const effectiveFloor = Math.min(player.floorFilled + (player.hasFirstPlayerMarker ? 1 : 0), FLOOR_PENALTIES.length);
    const floorPenalty = sumFloorPenalty(effectiveFloor);
    player.floorFilled = 0;
    player.hasFirstPlayerMarker = false;
    const rawDelta = wallScore + floorPenalty;
    // le total cumulé ne peut jamais descendre sous 0 (règle officielle) ; on clampe le cumul, pas le delta de la manche
    const newTotal = Math.max(0, player.totalScore + rawDelta);
    player.roundHistory.push({ round, wallScore, floorPenalty, roundDelta:rawDelta, runningTotal:newTotal, completedLines:completed, discardedLines:discarded });
    player.totalScore = newTotal;
  }

  function computeEndGameBonuses(player){
    const wall = player.wall;
    let rows = 0, cols = 0, colors = 0;
    for (let r = 0; r < 5; r++) if (wall[r].every(c => c !== null)) rows++;
    for (let c = 0; c < 5; c++) if (wall.every(row => row[c] !== null)) cols++;
    for (const color of COLORS.map(c => c.id)){
      let count = 0;
      for (let r = 0; r < 5; r++) for (let c = 0; c < 5; c++) if (wall[r][c] === color) count++;
      if (count === 5) colors++;
    }
    const bonusPoints = rows*2 + cols*7 + colors*10;
    player.finalBonuses = { rows, cols, colors, bonusPoints };
    player.totalScore += bonusPoints;
  }

  // ---------- helpers ----------
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  function hexToRgba(hex, alpha){
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  // superpose un reflet glacé (façon céramique émaillée) sur les tuiles pleines
  function tileGloss(hex){
    return `linear-gradient(160deg, rgba(255,255,255,.4), rgba(255,255,255,0) 45%, rgba(0,0,0,.14)), ${hex}`;
  }
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
  }
  let toastTimer = null;
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ---------- setup screen ----------
  function renderPlayerCountSelector(){
    const el = document.getElementById('player-count-selector');
    el.innerHTML = '';
    [2,3,4].forEach(n => {
      const btn = document.createElement('button');
      btn.textContent = n;
      btn.className = 'count-btn' + (n === setupPlayerCount ? ' active' : '');
      btn.addEventListener('click', () => { setupPlayerCount = n; renderPlayerCountSelector(); renderNameInputs(); });
      el.appendChild(btn);
    });
  }
  function renderNameInputs(){
    const el = document.getElementById('player-name-inputs');
    const existing = Array.from(el.querySelectorAll('input')).map(i => i.value);
    el.innerHTML = '';
    for (let i = 0; i < setupPlayerCount; i++){
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = `Joueur ${i+1}`;
      input.value = existing[i] || '';
      input.className = 'name-input';
      el.appendChild(input);
    }
  }
  function startNewGame(){
    const names = Array.from(document.querySelectorAll('.name-input')).map((inp,i) => inp.value.trim() || `Joueur ${i+1}`);
    gameState = { players: names.map(createPlayer), currentRound:1, currentPlayerIndex:0, phase:'playing' };
    lastSnapshot = null;
    saveState();
    showScreen('screen-playing');
    renderPlaying();
  }

  // ---------- playing screen ----------
  function renderPlaying(){
    renderPlayerTabs();
    renderRoundBadge();
    renderBoard();
    document.getElementById('btn-undo').style.display = lastSnapshot ? 'inline-block' : 'none';
  }

  function renderPlayerTabs(){
    const el = document.getElementById('player-tabs');
    el.innerHTML = gameState.players.map((p,i) =>
      `<button class="player-tab ${i===gameState.currentPlayerIndex?'active':''}" data-idx="${i}">${escapeHtml(p.name)} · ${p.totalScore}</button>`
    ).join('');
    el.querySelectorAll('.player-tab').forEach(btn => {
      btn.addEventListener('click', () => { gameState.currentPlayerIndex = parseInt(btn.dataset.idx,10); renderPlaying(); });
    });
  }

  function renderRoundBadge(){
    const el = document.getElementById('round-badge');
    el.innerHTML = `<span class="rb-num">${gameState.currentRound}</span><span class="rb-label">Manche</span>`;
    el.style.cursor = 'pointer';
    el.title = 'Toucher pour voir l\'historique des manches';
    el.onclick = showHistory;
  }

  // historique complet des manches, ouvert en touchant le badge de manche
  function showHistory(){
    const anyHistory = gameState.players.some(p => p.roundHistory.length);
    if (!anyHistory){ showToast('Aucune manche terminée pour le moment.'); return; }
    document.getElementById('round-summary-title').textContent = 'Historique des manches';
    document.getElementById('round-summary-body').innerHTML = gameState.players.map(p => {
      const rows = p.roundHistory.map(s =>
        `<li>Manche ${s.round} : mur +${s.wallScore}, plancher ${s.floorPenalty} → ${s.roundDelta>=0?'+':''}${s.roundDelta} (total ${s.runningTotal})</li>`
      ).join('');
      return `<div style="color:var(--text); margin-bottom:12px;"><strong>${escapeHtml(p.name)}</strong>
        ${rows ? `<ul style="margin:4px 0; padding-left:20px;">${rows}</ul>` : '<p style="margin:4px 0;color:var(--muted)">—</p>'}
      </div>`;
    }).join('');
    document.getElementById('round-summary-modal').style.display = 'flex';
  }

  function renderBoard(){
    const player = currentPlayer();
    const container = document.getElementById('board');

    const patternHtml = player.patternLines.map((line, row) => {
      const slots = Array.from({length:line.capacity}, (_, i) => {
        // remplissage côté mur (bord droit), comme sur le plateau physique
        const filled = i >= line.capacity - line.count;
        return `<div class="pl-slot" style="${filled ? `background:${tileGloss(COLOR_MAP[line.color].hex)}` : ''}">${filled ? `<span class="tile-sym">${COLOR_MAP[line.color].symbol}</span>` : ''}</div>`;
      }).join('');
      const swatches = COLORS.map(c => {
        const col = wallColumnFor(row, c.id);
        const disabledHint = player.wall[row][col] !== null;
        return `<button class="swatch ${disabledHint?'disabled-hint':''}" style="background:${tileGloss(c.hex)}" data-row="${row}" data-color="${c.id}" title="${c.label}"><span class="tile-sym">${c.symbol}</span></button>`;
      }).join('');
      return `<div class="pattern-row">
        <div class="pl-slots" data-row="${row}">${slots}</div>
        <div class="pl-palette">${swatches}</div>
      </div>`;
    }).join('');

    const wallHtml = `<div class="wall-grid">` + player.wall.map((rowArr, r) =>
      rowArr.map((cell, c) => {
        const patternHex = COLOR_MAP[WALL_PATTERN[r][c]].hex;
        const style = cell !== null
          ? `background:${tileGloss(COLOR_MAP[cell].hex)}`
          : `background:${hexToRgba(patternHex,0.16)}; border:1px dashed ${hexToRgba(patternHex,0.45)};`;
        // case vide : symbole en filigrane de la couleur attendue (repère daltonien du motif du mur)
        const sym = cell !== null
          ? `<span class="tile-sym">${COLOR_MAP[cell].symbol}</span>`
          : `<span class="tile-sym" style="color:${hexToRgba(patternHex,0.7)}; text-shadow:none;">${COLOR_MAP[WALL_PATTERN[r][c]].symbol}</span>`;
        return `<div class="wall-cell" style="${style}">${sym}</div>`;
      }).join('')
    ).join('') + `</div>`;

    const markerOffset = player.hasFirstPlayerMarker ? 1 : 0;
    const floorHtml = `<div class="floor-line">` + FLOOR_PENALTIES.map((pen, i) => {
      if (markerOffset && i === 0){
        return `<div class="floor-slot filled marker" data-idx="0" title="Jeton premier joueur">1er</div>`;
      }
      const filled = i < markerOffset + player.floorFilled;
      return `<div class="floor-slot ${filled?'filled':''}" data-idx="${i}">${pen}</div>`;
    }).join('') + `</div>
      <label class="marker-toggle"><input type="checkbox" id="marker-checkbox" ${player.hasFirstPlayerMarker?'checked':''}/> Jeton premier joueur (occupe la 1ère case du plancher)</label>`;

    // aperçu en direct de la manche en préparation (simulation sur un clone, rien n'est modifié)
    const preview = previewRound(player);
    const previewHtml = preview && (preview.wallScore !== 0 || preview.floorPenalty !== 0)
      ? `<p class="round-preview">Cette manche : mur +${preview.wallScore} · plancher ${preview.floorPenalty} → ${preview.roundDelta >= 0 ? '+' : ''}${preview.roundDelta}</p>`
      : '';

    container.innerHTML = `
      <h2>Lignes de motifs</h2>
      ${patternHtml}
      <h2>Mur</h2>
      ${wallHtml}
      <h2>Ligne de plancher</h2>
      ${floorHtml}
      <p class="score-line">Score total : <strong>${player.totalScore}</strong></p>
      ${previewHtml}
    `;

    container.querySelectorAll('.swatch').forEach(btn => {
      btn.addEventListener('click', () => tapColor(parseInt(btn.dataset.row,10), btn.dataset.color));
    });
    container.querySelectorAll('.pl-slots').forEach(el => {
      el.addEventListener('click', () => tapSlots(parseInt(el.dataset.row,10)));
    });
    container.querySelectorAll('.floor-slot').forEach(el => {
      el.addEventListener('click', () => tapFloorSlot(parseInt(el.dataset.idx,10)));
    });
    document.getElementById('marker-checkbox').addEventListener('change', (e) => {
      // le jeton n'est plus fusionné dans floorFilled : il occupe visuellement la 1ère case et
      // compte pour une case au décompte (endRoundForPlayer) — décocher ne peut donc plus
      // supprimer une vraie tuile par erreur (ex : plancher déjà plein au moment du cochage)
      player.hasFirstPlayerMarker = e.target.checked;
      saveState();
      renderBoard();
    });
  }

  function addFloorTile(player){
    const offset = player.hasFirstPlayerMarker ? 1 : 0;
    player.floorFilled = Math.min(player.floorFilled + 1, FLOOR_PENALTIES.length - offset);
  }

  // simule la fin de manche sur un clone pour afficher les points en préparation
  function previewRound(player){
    try{
      const clone = JSON.parse(JSON.stringify(player));
      endRoundForPlayer(clone, 0);
      return clone.roundHistory[clone.roundHistory.length - 1];
    }catch(e){ return null; }
  }

  function tapColor(rowIndex, colorId){
    const player = currentPlayer();
    const line = player.patternLines[rowIndex];

    if (line.count === line.capacity && line.color !== null){
      // ligne déjà complète : toute tuile supplémentaire n'a nulle part où aller, elle part au plancher
      addFloorTile(player);
      showToast(`Ligne ${rowIndex+1} déjà pleine : tuile envoyée au plancher.`);
      saveState();
      renderBoard();
      return;
    }

    // placement interdit par les règles : on bloque (avant, simple avertissement, et les tuiles
    // disparaissaient silencieusement en fin de manche)
    const col = wallColumnFor(rowIndex, colorId);
    if (player.wall[rowIndex][col] !== null){
      showToast(`${COLOR_MAP[colorId].label} est déjà posé sur cette ligne du mur — placement interdit.`);
      return;
    }
    if (line.color !== null && line.color !== colorId){
      showToast(`Ligne remplacée : ${COLOR_MAP[line.color].label} → ${COLOR_MAP[colorId].label}`);
      line.color = colorId;
      line.count = 1;
    } else {
      line.color = colorId;
      line.count = line.count + 1;
    }
    saveState();
    renderBoard();
  }

  function tapSlots(rowIndex){
    const player = currentPlayer();
    const line = player.patternLines[rowIndex];
    if (line.count > 0){
      line.count -= 1;
      if (line.count === 0) line.color = null;
      saveState();
      renderBoard();
    }
  }

  function tapFloorSlot(i){
    const player = currentPlayer();
    const offset = player.hasFirstPlayerMarker ? 1 : 0;
    if (offset && i === 0){
      // taper la case du jeton = retirer le jeton (équivalent à décocher la case à cocher)
      player.hasFirstPlayerMarker = false;
    } else {
      const rel = i - offset;
      const newFilled = (rel < player.floorFilled) ? rel : rel + 1;
      player.floorFilled = Math.min(newFilled, FLOOR_PENALTIES.length - offset);
    }
    saveState();
    renderBoard();
  }

  function showRoundSummary(summaries){
    document.getElementById('round-summary-title').textContent = 'Résumé de la manche';
    const body = document.getElementById('round-summary-body');
    body.innerHTML = gameState.players.map((p,i) => {
      const s = summaries[i];
      const sign = s.roundDelta >= 0 ? '+' : '';
      // completedLines est déjà dans l'ordre ligne 1 → ligne 5 (ordre de calcul réel)
      const lines = s.completedLines.map(l =>
        `<li>Ligne ${l.row+1} (${COLOR_MAP[l.color].label}) : +${l.points}</li>`
      ).join('') + (s.discardedLines || []).map(l =>
        `<li style="color:var(--accent-2)">Ligne ${l.row+1} (${COLOR_MAP[l.color].label}) : défaussée — couleur déjà posée sur le mur</li>`
      ).join('');
      return `<div style="color:var(--text); margin-bottom:12px;"><strong>${escapeHtml(p.name)}</strong>
        ${lines ? `<ul style="margin:4px 0; padding-left:20px;">${lines}</ul>` : '<p style="margin:4px 0;color:var(--muted)">Aucune ligne complétée</p>'}
        <p style="margin:4px 0 0;">mur +${s.wallScore}, plancher ${s.floorPenalty} → ${sign}${s.roundDelta} (total ${s.runningTotal})</p>
      </div>`;
    }).join('');
    document.getElementById('round-summary-modal').style.display = 'flex';
  }

  // petite pluie d'azulejos pour couronner les résultats
  function launchConfetti(){
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if (document.getElementById('confetti')) return;
    const colors = COLORS.map(c => c.hex).concat('#c9932c');
    const wrap = document.createElement('div');
    wrap.id = 'confetti';
    for (let i = 0; i < 70; i++){
      const c = document.createElement('div');
      c.className = 'confetto';
      const size = 6 + Math.random()*8;
      c.style.left = Math.random()*100 + 'vw';
      c.style.width = size + 'px';
      c.style.height = size + 'px';
      c.style.background = colors[i % colors.length];
      c.style.animationDuration = (2.4 + Math.random()*2.4) + 's';
      c.style.animationDelay = (Math.random()*0.9) + 's';
      c.style.borderRadius = Math.random() < 0.3 ? '50%' : '2px';
      wrap.appendChild(c);
    }
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), 6500);
  }

  // ---------- results screen ----------
  function renderResults(){
    const el = document.getElementById('results');
    const sorted = [...gameState.players].sort((a,b) =>
      b.totalScore - a.totalScore || (b.finalBonuses?.rows||0) - (a.finalBonuses?.rows||0)
    );
    const top = sorted[0];
    el.innerHTML = `<h1>Résultats finaux</h1>` + sorted.map((p,i) => {
      // couronne uniquement après le départage officiel (lignes complètes) — un score égal mais
      // moins de lignes n'est pas une victoire partagée
      const isWinner = p.totalScore === top.totalScore &&
        (p.finalBonuses?.rows||0) === (top.finalBonuses?.rows||0);
      const b = p.finalBonuses || { rows:0, cols:0, colors:0, bonusPoints:0 };
      return `<div class="result-row ${isWinner?'winner':''}" style="animation-delay:${i*80}ms">
        <span class="rank">#${i+1}${isWinner?' 👑':''}</span>
        <span class="rname">${escapeHtml(p.name)}</span>
        <span class="rscore">${p.totalScore} pts</span>
        <div class="rbonus">Bonus : ${b.rows} ligne(s) (+${b.rows*2}), ${b.cols} colonne(s) (+${b.cols*7}), ${b.colors} couleur(s) (+${b.colors*10})</div>
      </div>`;
    }).join('');
  }

  // ---------- wiring ----------
  function init(){
    const saved = loadState();
    if (saved){
      document.getElementById('resume-banner').style.display = 'block';
      document.getElementById('btn-resume').addEventListener('click', () => {
        gameState = saved;
        if (gameState.phase === 'ended'){
          renderResults();
          showScreen('screen-results');
        } else {
          showScreen('screen-playing');
          renderPlaying();
        }
      });
      document.getElementById('btn-discard').addEventListener('click', () => {
        clearState();
        document.getElementById('resume-banner').style.display = 'none';
      });
    }

    renderPlayerCountSelector();
    renderNameInputs();
    document.getElementById('btn-start').addEventListener('click', startNewGame);

    document.getElementById('btn-end-round').addEventListener('click', () => {
      lastSnapshot = JSON.parse(JSON.stringify(gameState));
      const round = gameState.currentRound;
      const summaries = gameState.players.map(p => {
        endRoundForPlayer(p, round);
        return p.roundHistory[p.roundHistory.length - 1];
      });
      gameState.currentRound += 1;
      saveState();
      renderPlaying();
      showRoundSummary(summaries);
    });

    document.getElementById('btn-undo').addEventListener('click', () => {
      if (lastSnapshot){
        gameState = lastSnapshot;
        lastSnapshot = null;
        saveState();
        renderPlaying();
      }
    });

    document.getElementById('btn-close-summary').addEventListener('click', () => {
      document.getElementById('round-summary-modal').style.display = 'none';
    });

    document.getElementById('btn-end-game').addEventListener('click', () => {
      // piège classique : finir la partie sans avoir terminé la dernière manche — les lignes
      // complètes et le plancher ne seraient jamais comptés, seuls les bonus s'ajouteraient
      const pending = gameState.players.some(p =>
        p.patternLines.some(l => l.count === l.capacity && l.color !== null) ||
        p.floorFilled > 0 || p.hasFirstPlayerMarker);
      if (pending){
        if (!confirm("La manche en cours n'est pas encore comptée (lignes complètes ou plancher). Elle sera d'abord terminée, puis les bonus finaux calculés. Continuer ?")) return;
        const round = gameState.currentRound;
        gameState.players.forEach(p => endRoundForPlayer(p, round));
        gameState.currentRound += 1;
      } else {
        if (!confirm('Terminer la partie et calculer les bonus finaux ?')) return;
      }
      gameState.players.forEach(computeEndGameBonuses);
      gameState.phase = 'ended';
      saveState();
      renderResults();
      showScreen('screen-results');
      launchConfetti();
    });

    document.getElementById('btn-new-game').addEventListener('click', () => {
      clearState();
      gameState = null;
      lastSnapshot = null;
      document.getElementById('resume-banner').style.display = 'none';
      showScreen('screen-setup');
    });
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
